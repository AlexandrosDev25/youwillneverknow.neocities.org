<!doctype html> <!-- indica que este documento usa HTML5 -->
<html lang="es"> <!-- lang="es": el idioma del sitio es español -->
<head>
  <!-- head: configuración invisible de la página, no se muestra en pantalla -->
  <meta charset="utf-8"> <!-- permite usar acentos y caracteres especiales -->
  <meta name="viewport" content="width=device-width,initial-scale=1"> <!-- hace la página adaptable a móviles -->
  <title>YouWillNeverKnow</title> <!-- texto que aparece en la pestaña del navegador -->
  <link rel="icon" href="multimedia/photos/pixelsword_icon.jpeg" type="image/jpeg"> <!-- ícono de la pestaña -->

  <style>
    /* Todo lo que está dentro de <style> es CSS: le da apariencia a los elementos HTML */

    html, body {
      height: 100%; /* ambos ocupan toda la altura disponible */
      margin: 0;    /* elimina el margen blanco que pone el navegador por defecto */
    }

    body {
      margin: 0;
      min-height: 100vh; /* mínimo ocupa toda la altura de la ventana del navegador */
      background-color: #000000; /* color negro de respaldo si el video no carga */
    }

    /* ── HEADER ────────────────────────────────── */

    header {
      display: flex;          /* activa flexbox: organiza los hijos (h1 y nav) en fila o columna */
      flex-direction: column; /* los apila verticalmente: título arriba, nav abajo */
      align-items: center;    /* centra los hijos horizontalmente */
      padding: 20px;          /* espacio interior de 20px en los 4 lados del header */
      width: 100%;
    }

    .titulo {
      font-size: 48px;          /* tamaño del texto del título */
      text-align: center;       /* centra el texto dentro del elemento */
      color: white;
      margin: 20px 0 8px -68px;       /* elimina el margen por defecto del h1; deja 10px de espacio abajo */
    }                           /* (margin: arriba: 20px derecha: 0 abajo: 8px izquierda: -68px) */

    .nav-bar {
      display: flex;         /* pone todos los elementos de la nav en fila horizontal */
      align-items: center;   /* los alinea al centro verticalmente */
      gap: 8px;             /* espacio de 8px entre cada elemento de la fila */
      color: white;
      font-size: 18px; /* tamaño del texto de todos los <span> dentro de la nav */
      width: 100%;
      justify-content: center; /* centra toda la fila de elementos dentro de la nav */
      }

    .frame-nav {                              /* frame pequeño que va en el centro de la nav */
      width: 250px;
      min-width: 250px; /* asegura que el frame no se reduzca por debajo de 250px en pantallas pequeñas */
      max-width: 250px; /* asegura que el frame no se expanda por encima de 250px en pantallas grandes */
      height: 120px;
      border: 1px solid rgba(180, 100, 100, 0.4);       /* borde color vino semitransparente */
      background-color: rgba(18, 10, 10, 0.55);         /* fondo negro rojizo semitransparente */
      /* rgba(rojo, verde, azul, opacidad) */
      overflow: hidden;
      position: relative; /* necesario para que object-fit funcione*/
    }
    .frame-nav img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%; /* el gif ocupa todo el ancho del frame-nav*/
      height: 100%; /*el gif ocupa todo el alto del frame-nav*/
      object-fit: cover; /* recorta el gif para llenar el frame-nav sin deformarlo*/
    }
    /* ── MAIN ─────────────────────────────────── */

    main {
      display: flex;
      justify-content: center; /* centra el contenedor-principal horizontalmente */
      align-items: center;     /* centra el contenedor-principal verticalmente */
      min-height: 80vh;        /* ocupa el 80% de la altura de la ventana */
    }

    .contenedor-principal {
      position: relative; /* convierte este div en punto de referencia para sus futuros hijos absolute */
      width: 60vw;        /* 60% del ancho de la ventana (vw = viewport width) */
      height: 65vh;       /* 65% de la altura de la ventana (vh = viewport height) */
      border: 1px solid rgba(180, 100, 100, 0.3);
      background-color: rgba(18, 10, 10, 0.55);
    }

    .contenedor-principal img {
      position: absolute; /* lo saca del flujo, no afecta la posición de otros elementos */
      top: 0;
      left: 0;
      width: 100%; /* el gif ocupa todo el ancho del contenedor-principal */
      height: 100%; /* el gif ocupa todo el alto del contenedor-principal */
      object-fit: cover; /* recorta el gif para llenar el contenedor sin deformarlo */
    }

    /* ── VIDEO DE FONDO ───────────────────────── */

    .bg-video {
      position: fixed;      /* se ancla a la ventana, no se mueve al hacer scroll */
      inset: 0;             /* equivale a top:0; right:0; bottom:0; left:0 — cubre toda la ventana */
      width: 100%;
      height: 100%;
      object-fit: cover;    /* escala el video para cubrir toda la pantalla sin deformarlo */
      z-index: -1;          /* lo manda detrás de todo el contenido de la página */
      pointer-events: none; /* impide que el video capture clicks o gestos del usuario */
    }

  </style>
</head>

<body>
  <!-- body: todo lo visible de la página va aquí -->

  <header> <!--- header: contenedor semántico para la cabecera de la página, suele incluir título y navegación -->
    <!-- h1: título principal de la página, solo debe haber uno por página -->
    <h1 class="titulo">LOREM IPSUM</h1>

    <!-- nav: contenedor semántico para grupos de navegación (menús, secciones) -->
    <nav class="nav-bar">
      <!-- span: caja de texto sin significado propio, solo agrupa texto para aplicarle estilos -->
      <span>Home</span>
      <span>|</span>   <!-- separador visual entre links -->
      <span>News</span>
      <span>|</span>
      <span>Blog</span>
      <span>|</span>

      <!-- div: caja genérica sin significado semántico, usada aquí como frame decorativo -->
      <div class="frame-nav">
        <img src="multimedia/gifs/nyan-cat-tac-nayn.gif" alt="nyan cat gif">
      </div> <!-- frame gif central de la nav, que es el padre del gif -absolute- que irá dentro--->

      <span>|</span>
      <span>Portfolio</span>
      <span>|</span>
      <span>Find me</span>
      <span>|</span>
      <span>Downloads</span>
    </nav>
  </header>

  <main> <!--- main: contenedor semántico para el contenido principal de la página --->
    <!-- contenedor-principal: padre de los frames que vendrán después -->
    <!-- position:relative en CSS lo convierte en punto de referencia para sus hijos absolute -->
    <div class="contenedor-principal">
      <!-- aquí irán los frames hijos en el siguiente paso -->
      <img src="multimedia/gifs/cat-dance.gif" alt="cat dance gif">
    </div>
  </main>



  <!-- video de fondo: va al final del body porque es decorativo -->
  <!-- position:fixed en CSS lo saca del flujo, no afecta la posición de ningún otro elemento -->
  <video autoplay muted loop playsinline aria-hidden="true" class="bg-video">
    <!-- autoplay: se reproduce solo al cargar la página -->
    <!-- muted: silenciado (obligatorio para que autoplay funcione en navegadores modernos) -->
    <!-- loop: se repite indefinidamente -->
    <!-- playsinline: en móviles no abre pantalla completa -->
    <!-- aria-hidden="true": le dice a lectores de pantalla que este video es decorativo -->
    <source src="multimedia/videos/sekiro_backgroundv.1.mp4" type="video/mp4">
    Tu navegador no soporta la etiqueta video. <!-- texto de respaldo para navegadores muy antiguos -->
  </video>

</body>
</html>

<!-- Accesibilidad y buenas prácticas:
       - Usar aria-hidden="true" es adecuado si el video es solo decorativo.
       - Si el video transmite información (ej. instrucciones o texto), ofrece la misma información en texto accesible y añade controles (atributo controls) para permitir pausar.
       - Ten en cuenta el rendimiento: optimiza el tamaño del video, ofrece versiones más ligeras para móviles o usa técnicas de carga diferida si es necesario.
  -->

<!--
  - Archivo y ruta:
    * Ruta relativa: 'fondo.jpg' (busca en la misma carpeta que el HTML).
    * Ruta relativa con subcarpeta: 'images/fondo.jpg'.
    * Ruta absoluta: 'C:\Users\...' (no recomendable para páginas web públicas).
  - Extensiones y formatos:
    * JPEG/JPG: buen balance calidad/compresión para fotos.
    * PNG: soporta transparencia, útil para gráficos.
    * WebP: moderno, más eficiente (recomendado cuando sea compatible).
    * MP4: formato de video, no es una imagen; para fondos de video usar la etiqueta <video>.
  - Rendimiento y buenas prácticas:
    * Redimensiona imágenes a las dimensiones reales necesarias (por ejemplo 1920px de ancho para pantallas grandes),
      y utiliza compresión para reducir el tamaño en KB/MB.
    * Considera usar imágenes adaptativas (srcset / picture) si planeas servir diferentes resoluciones según dispositivo.
  - Cómo probar:
    * Guarda los cambios y abre el archivo localmente con doble clic en 'index.html' o arrastrándolo al navegador.
    * Para pruebas más reales, sirve la carpeta con un servidor local (por ejemplo: "npx http-server" o "python -m http.server") y abre http://localhost:8080.
-->
